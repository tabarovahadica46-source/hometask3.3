<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css">
</head>
<body>
    <header class="flex justify-around items-center">
        <div class="hidden lg:flex lg:gap-6">
        <p>Booking</p>
        <p>Facilities</p>
        <p>About Us</p>
        <p>Location</p>
        <p>Contact</p>
      
        </div>
          <p class="lg:hidden">☰</p>
        <button class="text-white font-bold bg-[#24AB70] p-3.5 rounded-2xl">Login</button>
    </header>
    <section class="max-w-7xl mx-auto px-6 py-12 lg:py-20 bg-[#24AB700A] p-6 rounded-2xl">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
      
      <div class="lg:col-span-7 space-y-8">
        <div class="space-y-4">
          <h1 class="text-4xl lg:text-6xl font-bold text-gray-900 leading-tight">
            Find your perfect <br class="hidden lg:inline"> place to stay
          </h1>
          <p class="text-gray-500 text-base max-w-md">
            Lorem Ipsum is simply dummy text of the printing and typesetting industry.
          </p>
        </div>

        <div class="flex items-center">
          <button class="flex items-center gap-2 text-[#24AB70] font-medium hover:opacity-80 transition">
            <span class="w-8 h-8 flex items-center justify-center bg-[#24AB70]/10 rounded-full">
           
            </span>
            Watch video
          </button>
        </div>

        <div class="bg-white p-4 shadow-xl shadow-gray-100 rounded-2xl lg:rounded-full border border-gray-100">
          <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
            
            <div class="flex items-center gap-3 px-3 md:border-r border-gray-200">
              <i data-lucide="map-pin" class="w-5 h-5 text-[#24AB70]"></i>
              <div>
                <label class="block text-xs font-semibold text-gray-400">Location</label>
                <input type="text" placeholder="United States" class="w-full text-sm font-medium text-gray-800 focus:outline-none bg-transparent placeholder-gray-800">
              </div>
            </div>

            <div class="flex items-center gap-3 px-3 md:border-r border-gray-200">
              <i data-lucide="calendar" class="w-5 h-5 text-[#24AB70]"></i>
              <div>
                <label class="block text-xs font-semibold text-gray-400">Check in</label>
                <input type="text" placeholder="10 Jun 2021" class="w-full text-sm font-medium text-gray-800 focus:outline-none bg-transparent placeholder-gray-800">
              </div>
            </div>

            <div class="flex items-center gap-3 px-3 md:border-r border-gray-200">
              <i data-lucide="calendar" class="w-5 h-5 text-[#24AB70]"></i>
              <div>
                <label class="block text-xs font-semibold text-gray-400">Check out</label>
                <input type="text" placeholder="15 Jun 2021" class="w-full text-sm font-medium text-gray-800 focus:outline-none bg-transparent placeholder-gray-800">
              </div>
            </div>

            <div class="flex items-center justify-between gap-2 px-3">
              <div class="flex items-center gap-3">
                <i data-lucide="user" class="w-5 h-5 text-[#24AB70]"></i>
                <div>
                  <label class="block text-xs font-semibold text-gray-400">Rooms for</label>
                  <input type="text" placeholder="1 room, 2 guests" class="w-full text-sm font-medium text-gray-800 focus:outline-none bg-transparent placeholder-gray-800">
                </div>
              </div>
              
              <button class="bg-[#24AB70] hover:bg-[#1e945f] text-white p-3 md:p-4 rounded-xl md:rounded-full flex items-center justify-center gap-2 transition whitespace-nowrap shadow-md shadow-[#24AB70]/20">
                <i data-lucide="search" class="w-5 h-5"></i>
                <span class="md:hidden lg:inline text-sm font-medium px-1">Search</span>
              </button>
            </div>

          </div>
        </div>
      </div>

      <div class="lg:col-span-5 grid grid-cols-12 gap-4 relative">
        <div class="col-span-12">
          <img src="./img/image (2).png" 
               alt="" 
               class="w-full h-[300px] lg:h-[400px] object-cover rounded-[2rem] shadow-md">
        </div>
       
      </div>

    </div>
  </section>

 
</body>
</html>
